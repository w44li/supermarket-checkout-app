# Server Configuration  
# Port 0 means Spring Boot will automatically choose an available port
server.port=0

# Application name (appears in logs and actuator endpoints)
spring.application.name=Supermarket Checkout App

# H2 Database Configuration (in-memory database for learning)
# This creates a database that exists only while the app is running
spring.datasource.url=jdbc:h2:mem:checkoutdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (web interface to view your database)
# You can access it at http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
# This automatically creates database tables based on your entity classes
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
# This shows more detailed logs so you can learn what Spring Boot is doing
logging.level.org.springframework.web=DEBUG
logging.level.com.supermarket.checkout=DEBUG